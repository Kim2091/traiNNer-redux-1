# yaml-language-server: $schema=https://raw.githubusercontent.com/the-database/traiNNer-redux/refs/heads/master/schemas/redux-config.schema.json
#########################################################################################
# General Settings
# https://trainner-redux.readthedocs.io/en/latest/config_reference.html#top-level-options
#########################################################################################
name: bgcc_2x
scale: 2  # 1, 2, 3, 4, 8
bgcc_mode: true  # Enable BGCC-specific color correction mode
high_order_degradation: false  # BGCC uses paired datasets, not high-order degradation
use_amp: true  # Speed up training and reduce VRAM usage. NVIDIA only.
amp_bf16: false  # Use bf16 instead of fp16 for AMP, RTX 3000 series or newer only. Only recommended if fp16 doesn't work.
use_channels_last: true  # Enable channels last memory format while using AMP. Reduces VRAM and speeds up training for most architectures, but some architectures are slower with channels last.
fast_matmul: false  # Trade precision for performance.
use_compile: false  # Enable torch.compile for generator. Takes time on startup to compile the model, but can speed up training after the model is compiled.
compile_mode: default  # Mode to use with torch.compile. See https://docs.pytorch.org/docs/stable/generated/torch.compile.html for more info.
num_gpu: auto
# manual_seed: 1024  # Random seed for training, useful for removing randomness when testing the effect of different settings.


########################################################################################################################
# Dataset and Dataloader Settings
# https://trainner-redux.readthedocs.io/en/latest/config_reference.html#dataset-options-datasets-train-and-datasets-val
########################################################################################################################
datasets:
  # Settings for the training dataset.
  train:
    name: Train Dataset
    type: pairedccdataset
    # LR input (e.g. DVD/LD): low-res source carrying the TARGET colors but with degradation.
    dataroot_lq: /absolute/path/to/lr  # TODO: update to your LR (DVD/LD) dataset path
    # HR reference input (e.g. Blu-ray): high-res source with correct structure but wrong colors.
    dataroot_hr: /absolute/path/to/hr  # TODO: update to your HR (BD) dataset path
    # CC_HR supervision target: the color-corrected HR produced by your manual pipeline.
    dataroot_gt: /absolute/path/to/cc_hr  # TODO: update to your CC_HR (color-corrected HR) dataset path

    gt_size: 128  # During training, a square of this size is cropped from GT images. Larger is usually better but uses more VRAM.
    use_hflip: true  # Randomly flip the images horizontally.
    use_rot: true  # Randomly rotate the images.

    # BGCC training augmentations. All defaults 0 (disabled). Tuned values below
    # are conservative starting points for a small (4-show) dataset.
    bgcc_aug:
      hue_shift_deg: 5.0          # +/- degrees on (LR, CC_HR) — diversifies target palette
      saturation_delta: 0.10      # +/- 10% on (LR, CC_HR) — palette saturation variation
      hr_gamma_delta: 0.10        # HR gamma in [0.9, 1.1] — mastering curve variation
      hr_rgb_gain_delta: 0.05     # each HR channel x [0.95, 1.05] — white-balance drift
      lr_chroma_subsample_factor: 4  # 4:2:0 subsampling factor on LR — chroma bleed severity

    num_worker_per_gpu: 8
    batch_size_per_gpu: 16  # Increasing stabilizes training but with diminishing returns. Use multiple of 8 for best performance with AMP.
    accum_iter: 1  # Using values larger than 1 simulates higher batch size by trading performance for reduced VRAM usage.

  # Settings for your validation dataset (optional). These settings will
  # be ignored if val_enabled is false in the Validation section below.
  val:
    name: Val Dataset
    type: pairedccdataset
    dataroot_lq: /absolute/path/to/val/lr  # TODO: Update to your validation LR path
    dataroot_hr: /absolute/path/to/val/hr  # TODO: Update to your validation HR path
    dataroot_gt: /absolute/path/to/val/cc_hr  # TODO: Update to your validation CC_HR path

#####################################################################
# Network Settings
# https://trainner-redux.readthedocs.io/en/latest/arch_reference.html
#####################################################################
# Generator model settings
network_g:
  type: bgcc
  feat: 32  # Feature width of the encoder
  d: 8  # Bilateral bin count
  n_blocks_per_stage: 2  # Number of FastResBlocks at each encoder stage
  guidance_hidden: 8  # Hidden width of the guidance MLP

#########################################################################################
# Pretrain and Resume Paths
# https://trainner-redux.readthedocs.io/en/latest/config_reference.html#path-options-path
#########################################################################################
path:
  pretrain_network_g: ~
  param_key_g: ~
  strict_load_g: true
  resume_state: ~

###########################################################################################
# Training Settings
# https://trainner-redux.readthedocs.io/en/latest/config_reference.html#train-options-train
###########################################################################################
train:
  ema_decay: 0.999
  grad_clip: false  # Gradient clipping allows more stable training when using higher learning rates.
  grad_clip_max_norm: 100  # Max norm of gradients for gradient clipping.
  # Optimizer for generator model
  optim_g:
    type: AdamW
    lr: !!float 5e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000  # Total number of iterations.
  warmup_iter: -1  # Gradually ramp up learning rates until this iteration, to stabilize early training. Use -1 to disable.

  # Losses - for any loss set the loss_weight to 0 to disable it.
  # https://trainner-redux.readthedocs.io/en/latest/loss_reference.html
  losses:
    # Bleed-focal L1 loss: concentrates gradient on pixels where LR differs
    # from CC_HR, forcing the model to learn de-bleeding instead of taking
    # the "output = upsampled LR" shortcut.
    - type: bleedfocall1loss
      loss_weight: 1.0
      focal_gain: 4.0        # extra weight on bled pixels
      focal_threshold: 0.05  # channel-mean diff threshold for bleed detection

##############################################################################################
# Validation
# https://trainner-redux.readthedocs.io/en/latest/config_reference.html#validation-options-val
##############################################################################################
val:
  val_enabled: false  # Whether to enable validations. If disabled, all validation settings below are ignored.
  val_freq: 1000  # How often to run validations, in iterations.
  save_img: true  # Whether to save the validation images during validation, in the experiments/<name>/visualization folder.
  tile_size: 0  # Tile size of input, reduce VRAM usage but slower inference. 0 to disable.
  tile_overlap: 8  # Number of pixels to overlap tiles by, larger is slower but reduces tile seams.

  metrics_enabled: false  # Whether to run metrics calculations during validation.

##############################################################################################
# Logging
# https://trainner-redux.readthedocs.io/en/latest/config_reference.html#logging-options-logger
##############################################################################################
logger:
  print_freq: 100
  save_checkpoint_freq: 1000
  save_checkpoint_format: safetensors
  use_tb_logger: true
